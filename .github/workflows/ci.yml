name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265 # v16.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.jsonc"

  markdown-links:
    name: Markdown link check
    runs-on: ubuntu-latest
    # External network flakiness should not block PRs unrelated to link content.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '**/*.md'
          fail: true

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.14.5
      - run: ruff check .

  dataset-smoke:
    name: Session 1 dataset smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The upstream sync (commit 00f804b) moved clean_submissions.csv from
      # session-one/data/ to session-one/solutions/ and dropped the
      # regenerate_clean.py script (it lives in the source repo, not here).
      # Both CSVs are now committed, so we just verify they exist and are
      # non-empty — guards against accidental deletion.
      - name: Verify session-one/data/raw_submissions.csv exists
        run: test -s session-one/data/raw_submissions.csv
      - name: Verify session-one/solutions/clean_submissions.csv exists
        run: test -s session-one/solutions/clean_submissions.csv
